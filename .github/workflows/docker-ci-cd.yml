name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- BUILD BACKEND ---
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/counselai-backend:latest

      # --- BUILD AI-SERVICE ---
      - name: Build and Push AI-Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          file: ./ai-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/counselai-ai-service:latest

  deploy-to-render:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Backend Deployment
        if: env.RENDER_BACKEND_HOOK != ''
        run: curl -X POST ${{ secrets.RENDER_BACKEND_HOOK }}
        env:
          RENDER_BACKEND_HOOK: ${{ secrets.RENDER_BACKEND_HOOK }}

      - name: Trigger Render AI Service Deployment
        if: env.RENDER_AI_HOOK != ''
        run: curl -X POST ${{ secrets.RENDER_AI_HOOK }}
        env:
          RENDER_AI_HOOK: ${{ secrets.RENDER_AI_HOOK }}
